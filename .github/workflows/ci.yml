name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-ci.txt -r requirements-test.txt
          pip install pytest-timeout

      - name: Run unit tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest tests/ -v --tb=short --timeout=120 \
            --cov=arkana --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            --cov-config=.coveragerc \
            --cov-fail-under=65

      - name: Run unit tests
        if: matrix.python-version != '3.11'
        run: |
          python -m pytest tests/ -v --tb=short --timeout=120

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies for syntax check
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-ci.txt
          pip install ruff==0.9.10

      - name: Check syntax (all Python files)
        run: |
          python -c "
          import pathlib, py_compile, sys
          errors = []
          for p in sorted(pathlib.Path('arkana').rglob('*.py')):
              try:
                  py_compile.compile(str(p), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          for p in sorted(pathlib.Path('tests').rglob('*.py')):
              try:
                  py_compile.compile(str(p), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              print(f'{len(errors)} syntax error(s) found:')
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print('All Python files passed syntax check.')
          "

      - name: Lint with ruff
        run: |
          ruff check arkana/ tests/ \
            --select=E9,F63,F7,F82,F841,W291,W292,W293,B006,B007,B018,UP031,UP032,RUF005,RUF010,RUF019,G010 \
            --no-fix

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Verify CLI --help works
        run: python -m arkana --help

      - name: Verify module imports
        run: |
          python -c "from arkana.constants import MAX_MCP_RESPONSE_SIZE_BYTES; print('constants OK')"
          python -c "from arkana.state import AnalyzerState; print('state OK')"
          python -c "from arkana.cache import AnalysisCache; print('cache OK')"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t arkana-test .
