{% extends "base.html" %}
{% block title %}Arkana — Timeline{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="glow">ANALYSIS TIMELINE</h1>
</div>

<div class="panel">
    <div class="panel-header">EVENTS <span class="badge badge-dim">{{ data|length if data else 0 }}</span></div>
    <div id="timeline-entries" hx-get="/dashboard/partials/timeline" hx-trigger="every 5s" hx-swap="innerHTML">
        {% include "partials/_timeline_entry.html" %}
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/dashboard/static/timeline.js"></script>
{% endblock %}
