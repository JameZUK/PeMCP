{% extends "base.html" %}
{% block title %}Arkana — Overview{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="glow">SYSTEM OVERVIEW</h1>
</div>

<div id="overview-stats" hx-get="/dashboard/partials/overview-stats" hx-trigger="every 5s" hx-swap="innerHTML">
    {% include "partials/_overview_stats.html" %}
</div>

<div class="panel" id="tasks-panel">
    <div class="panel-header">BACKGROUND TASKS</div>
    <div id="task-list" hx-get="/dashboard/partials/task-list" hx-trigger="every 3s" hx-swap="innerHTML">
        {% include "partials/_task_list.html" %}
    </div>
</div>
{% endblock %}
