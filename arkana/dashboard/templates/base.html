<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <!-- CSP is set via SecurityHeadersMiddleware in app.py (_CSP_VALUE) -->
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Arkana Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/dashboard/static/crt.css">
    <link rel="icon" href="/dashboard/static/logo_icon.svg" type="image/svg+xml">
</head>
<body>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <nav class="top-nav" id="top-nav">
        <div class="nav-brand">
            <img src="/dashboard/static/logo_icon.svg" alt="Arkana" class="nav-logo">
            <span class="nav-title">ARKANA</span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="/dashboard/" class="nav-link {% if nav_active == 'overview' %}active{% endif %}">OVERVIEW</a>
            <a href="/dashboard/functions" class="nav-link {% if nav_active == 'functions' %}active{% endif %}">FUNCTIONS</a>
            <a href="/dashboard/callgraph" class="nav-link {% if nav_active == 'callgraph' %}active{% endif %}">CALL GRAPH</a>
            <a href="/dashboard/sections" class="nav-link {% if nav_active == 'sections' %}active{% endif %}">SECTIONS</a>
            <a href="/dashboard/imports" class="nav-link {% if nav_active == 'imports' %}active{% endif %}">IMPORTS</a>
            <a href="/dashboard/hexview" class="nav-link {% if nav_active == 'hexview' %}active{% endif %}">HEX</a>
            <a href="/dashboard/strings" class="nav-link {% if nav_active == 'strings' %}active{% endif %}">STRINGS</a>
            <a href="/dashboard/capabilities" class="nav-link {% if nav_active == 'capabilities' %}active{% endif %}">CAPA</a>
            <a href="/dashboard/mitre" class="nav-link {% if nav_active == 'mitre' %}active{% endif %}">MITRE</a>
            <a href="/dashboard/types" class="nav-link {% if nav_active == 'types' %}active{% endif %}">TYPES</a>
            <a href="/dashboard/similarity" class="nav-link {% if nav_active == 'similarity' %}active{% endif %}">SIMILARITY</a>
            <a href="/dashboard/timeline" class="nav-link {% if nav_active == 'timeline' %}active{% endif %}">TIMELINE</a>
            <a href="/dashboard/notes" class="nav-link {% if nav_active == 'notes' %}active{% endif %}">NOTES</a>
        </div>
        <div class="nav-more-wrap" id="nav-more-wrap">
            <button class="nav-more-btn" id="nav-more-btn" aria-label="Show more navigation links">MORE <span class="nav-more-count" id="nav-more-count"></span>&#9662;</button>
            <div class="nav-more-dropdown" id="nav-more-dropdown"></div>
        </div>
        <div class="nav-search" id="nav-search">
            <input type="text" id="global-search-input" placeholder="/ search..." autocomplete="off">
            <div id="search-dropdown" class="search-dropdown hidden"></div>
        </div>
        <span id="nav-filename" class="nav-filename dim"></span>
    </nav>

    <div id="global-status" class="global-status-bar"
         hx-get="/dashboard/partials/global-status"
         hx-trigger="load, every 3s"
         hx-swap="innerHTML">
    </div>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="/dashboard/static/htmx.min.js"></script>
    <script src="/dashboard/static/dashboard.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
