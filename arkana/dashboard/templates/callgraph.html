{% extends "base.html" %}
{% block title %}Arkana — Call Graph{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="glow">CALL GRAPH</h1>
    <div class="header-controls">
        <span id="graph-stats" class="dim fs-11 ls-1 mr-8"></span>
        <!-- F2: Search bar -->
        <input type="text" id="graph-search" placeholder="SEARCH NODES..." class="w-150 fs-11">
        <span id="graph-search-count" class="dim fs-10 min-w-40"></span>
        <button class="btn fs-10 p-2-6" id="graph-search-clear">CLR</button>
        <label>LAYOUT:</label>
        <select id="layout-select">
            <option value="dagre">DAGRE</option>
            <option value="breadthfirst">BREADTHFIRST</option>
            <option value="cose">COSE</option>
            <option value="circle">CIRCLE</option>
        </select>
        <button class="btn" id="btn-fit">FIT</button>
        <button class="btn" id="btn-reload">RELOAD</button>
        <!-- F3: Show all (hidden by default) -->
        <button class="btn d-none border-warning warning" id="btn-show-all">SHOW ALL</button>
        <!-- F8: Export -->
        <button class="btn p-2-8 fs-10" id="btn-export-png">PNG</button>
        <button class="btn p-2-8 fs-10" id="btn-export-svg">SVG</button>
        <!-- F12: Bookmarks -->
        <div class="pos-relative d-inline-block">
            <button class="btn p-2-8 fs-10" id="btn-bookmark">BOOKMARKS</button>
            <div id="bookmark-dropdown" class="bookmark-dropdown hidden">
                <div id="bookmark-list"></div>
            </div>
        </div>
    </div>
</div>

<div class="panel graph-panel graph-panel-full">
    <div id="cy" class="cytoscape-container pos-relative">
        <!-- F1: Context menu -->
        <div id="cy-context-menu" class="graph-context-menu d-none">
            <div class="ctx-item" data-action="decompile">DECOMPILE</div>
            <div class="ctx-separator"></div>
            <div class="ctx-item" data-action="flag">FLAG</div>
            <div class="ctx-item" data-action="suspicious">SUSPICIOUS</div>
            <div class="ctx-item" data-action="clean">CLEAN</div>
            <div class="ctx-item" data-action="unreviewed">UNREVIEWED</div>
            <div class="ctx-separator"></div>
            <div class="ctx-item" data-action="xrefs">SHOW XREFS</div>
            <div class="ctx-item" data-action="center">CENTER</div>
            <div class="ctx-item" data-action="focus">FOCUS 2-HOP</div>
            <div class="ctx-separator"></div>
            <div class="ctx-item" data-action="bookmark">BOOKMARK</div>
        </div>
        <!-- F11: Tooltip -->
        <div id="cy-tooltip" class="graph-tooltip d-none"></div>
        <!-- F5: Minimap -->
        <div id="graph-minimap" class="graph-minimap">
            <img id="minimap-img" class="d-none minimap-img">
            <div id="minimap-viewport" class="minimap-viewport d-none"></div>
        </div>
        <!-- F6: Legend -->
        <div id="graph-legend" class="graph-legend">
            <div class="legend-header">
                <span>LEGEND</span>
                <button id="legend-close" class="legend-close-btn">[x]</button>
            </div>
            <div class="legend-body"></div>
        </div>
    </div>
    <div id="node-info" class="node-sidebar hidden">
        <div class="panel-header">FUNCTION DETAILS</div>
        <div class="sidebar-tab-bar">
            <button class="sidebar-tab active" data-tab="info">INFO</button>
            <button class="sidebar-tab" data-tab="xrefs">XREFS</button>
            <button class="sidebar-tab" data-tab="strings">STRINGS</button>
            <button class="sidebar-tab" data-tab="code">CODE</button>
            <button class="sidebar-tab" data-tab="cfg">CFG</button>
        </div>
        <div id="node-details" class="sidebar-tab-content"></div>
    </div>
    <!-- Decompile overlay — outside #cy so Cytoscape doesn't capture events -->
    <div id="decompile-overlay" class="decompile-overlay hidden">
        <div class="decompile-overlay-header">
            <span class="decompile-func-name"></span>
            <button id="decompile-overlay-close" class="btn p-1-6 fs-10 ml-auto">[X]</button>
        </div>
        <pre class="decompile-code"></pre>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/dashboard/static/cytoscape.min.js"></script>
<script src="/dashboard/static/dagre.min.js"></script>
<script src="/dashboard/static/cytoscape-dagre.js"></script>
<script src="/dashboard/static/callgraph.js"></script>
{% endblock %}
