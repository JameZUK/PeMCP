<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" width="580" height="200" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>

    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="hexClip">
      <polygon points="100,18 130,34 130,66 100,82 70,66 70,34"/>
    </clipPath>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="45%" style="stop-color:#00e5ff;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#00e5ff;stop-opacity:0.35"/>
      <stop offset="55%" style="stop-color:#00e5ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#00e5ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.15"/>
    </linearGradient>

    <linearGradient id="traceGrad2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#00e5ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.1"/>
    </linearGradient>

    <linearGradient id="hexInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2030"/>
      <stop offset="100%" style="stop-color:#071018"/>
    </linearGradient>

    <linearGradient id="peGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00b8d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="580" height="200" rx="6" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00e5ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="580" y2="50"/>
    <line x1="0" y1="100" x2="580" y2="100"/>
    <line x1="0" y1="150" x2="580" y2="150"/>
    <line x1="145" y1="0" x2="145" y2="200"/>
    <line x1="290" y1="0" x2="290" y2="200"/>
    <line x1="435" y1="0" x2="435" y2="200"/>
  </g>

  <!-- Hex dump strips -->
  <text x="290" y="20"
        font-family="'Courier New', Courier, monospace"
        font-size="7" fill="#00e5ff" text-anchor="middle" opacity="0.12" letter-spacing="2">
    4D 5A 90 00 03 00 00 00 04 00 00 00 FF FF 00 00
  </text>
  <text x="290" y="188"
        font-family="'Courier New', Courier, monospace"
        font-size="7" fill="#00e5ff" text-anchor="middle" opacity="0.12" letter-spacing="2">
    50 45 00 00 64 86 06 00 8A 4F D2 67 00 00 00 00
  </text>

  <!-- ===================== -->
  <!-- HEXAGONAL ICON        -->
  <!-- ===================== -->
  <polygon points="100,12 136,32 136,72 100,92 64,72 64,32"
           fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.15" filter="url(#outerGlow)"/>
  <polygon points="100,16 134,35 134,73 100,92 66,73 66,35"
           fill="url(#hexInner)" stroke="#00e5ff" stroke-width="1.2" opacity="0.7"/>
  <polygon points="100,24 127,40 127,72 100,88 73,72 73,40"
           fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <polygon points="100,16 134,35 134,73 100,92 66,73 66,35"
           fill="url(#scanGrad)" clip-path="url(#hexClip)" opacity="0.7"/>

  <g stroke="#00e5ff" stroke-width="1" opacity="0.8">
    <line x1="100" y1="16" x2="100" y2="22"/>
    <line x1="134" y1="35" x2="129" y2="38"/>
    <line x1="134" y1="73" x2="129" y2="70"/>
    <line x1="100" y1="92" x2="100" y2="86"/>
    <line x1="66" y1="73" x2="71" y2="70"/>
    <line x1="66" y1="35" x2="71" y2="38"/>
  </g>

  <text x="100" y="66"
        font-family="'Courier New', Courier, monospace"
        font-size="30" font-weight="700" font-style="italic"
        fill="#00e5ff" text-anchor="middle"
        filter="url(#textGlow)" letter-spacing="-1">PE</text>
  <text x="100" y="80"
        font-family="'Courier New', Courier, monospace"
        font-size="6.5" fill="#00e5ff" text-anchor="middle" opacity="0.5" letter-spacing="0.5">0x4D5A</text>

  <!-- ===================== -->
  <!-- CIRCUIT TRACES        -->
  <!-- ===================== -->
  <g>
    <path d="M134,44 L160,44 L165,50" fill="none" stroke="url(#traceGrad)" stroke-width="1"/>
    <circle cx="160" cy="44" r="1.5" fill="#00e5ff" opacity="0.5"/>
    <path d="M134,64 L155,64 L160,58" fill="none" stroke="url(#traceGrad)" stroke-width="1"/>
    <circle cx="155" cy="64" r="1.5" fill="#00e5ff" opacity="0.5"/>
    <path d="M134,54 L168,54" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.3"/>
    <circle cx="168" cy="54" r="1" fill="#00e5ff" opacity="0.5"/>
  </g>
  <g opacity="0.22">
    <path d="M510,54 L545,54 L553,46" fill="none" stroke="url(#traceGrad2)" stroke-width="0.8"/>
    <circle cx="545" cy="54" r="1.2" fill="#00e5ff"/>
    <path d="M510,68 L538,68" fill="none" stroke="url(#traceGrad2)" stroke-width="0.8"/>
    <circle cx="538" cy="68" r="1.2" fill="#00e5ff"/>
  </g>

  <!-- ===================== -->
  <!-- WORDMARK: PeMCP       -->
  <!-- "Pe" = cyan, "MCP" = white, joined as one word -->
  <!-- ===================== -->
  <text x="178" y="82"
        font-family="'Courier New', Courier, monospace"
        font-size="54" font-weight="700"
        fill="url(#peGrad)"
        filter="url(#textGlow)"
        letter-spacing="-1">Pe</text>

  <text x="246" y="82"
        font-family="'Courier New', Courier, monospace"
        font-size="54" font-weight="700"
        fill="#e8f4f8"
        letter-spacing="-1">MCP</text>

  <!-- Underline -->
  <rect x="178" y="90" width="318" height="2" rx="1" fill="#00e5ff" opacity="0.55" filter="url(#cyanGlow)"/>
  <rect x="178" y="94" width="318" height="0.5" rx="0.5" fill="#00e5ff" opacity="0.18"/>

  <!-- ===================== -->
  <!-- TAGLINE               -->
  <!-- ===================== -->
  <text x="178" y="114"
        font-family="'Courier New', Courier, monospace"
        font-size="9.5" fill="#4a8fa8" letter-spacing="1.5">GenAI Automated Advanced Multi-Format Binary Analysis</text>

  <!-- ===================== -->
  <!-- STAT PILLS            -->
  <!-- ===================== -->
  <rect x="178" y="132" width="68" height="18" rx="3"
        fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  <text x="212" y="145"
        font-family="'Courier New', Courier, monospace"
        font-size="8.5" fill="#00e5ff" text-anchor="middle" opacity="0.75" letter-spacing="0.5">105 TOOLS</text>

  <rect x="254" y="132" width="76" height="18" rx="3"
        fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.3"/>
  <text x="292" y="145"
        font-family="'Courier New', Courier, monospace"
        font-size="8.5" fill="#00e5ff" text-anchor="middle" opacity="0.6" letter-spacing="0.5">PE·ELF·MACH-O</text>

  <rect x="338" y="132" width="78" height="18" rx="3"
        fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.3"/>
  <text x="377" y="145"
        font-family="'Courier New', Courier, monospace"
        font-size="8.5" fill="#00e5ff" text-anchor="middle" opacity="0.6" letter-spacing="0.5">ANGR·YARA·VT</text>

  <!-- Author -->
  <text x="496" y="175"
        font-family="'Courier New', Courier, monospace"
        font-size="8" fill="#2a5568" text-anchor="end" letter-spacing="1">github.com/JameZUK</text>

  <!-- Corner marks -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.35">
    <path d="M8,8 L8,20 M8,8 L20,8"/>
    <path d="M572,8 L572,20 M572,8 L560,8"/>
    <path d="M8,192 L8,180 M8,192 L20,192"/>
    <path d="M572,192 L572,180 M572,192 L560,192"/>
  </g>

</svg>
